    <section class ="contenedor-contacto">
        <h2>Escribenos</h2>
        <p>Dejanos tus datos nosotros nos pondremos en contacto contigo.</p>

        <from action="#" method="post" class="form-conteiner">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Perez" required>
        </div>
            <div class="form-group">
                <label for="email">Correo Electronico</label>
                <input type="email" id="email" name="email" placeholder="Ej. juan@ejemplo.com" required>
        </div>
            <div class="form-group">
                <label for="numero">Numero de Telefono</label>
                <input type="tel" id="numero" name="numero" placeholder="Ej. +52 492 922 1836" required>
                </div>
            <div class="form-group">
                <label for="nivel">Nivel de Interes</label>
                <select name="nivel" id="nivel">
                    <option value="preescolvar">Preescolar</option>
                    <option value="primaria">Primaria</option>
                    <option value="secundaria">Secundaria</option>
                    <option value="preparatoria">Preparatoria</option>
                </select>
            </div>   
            <div class="form-group">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" placeholder="Escribe tu mensaje aquí..." required></textarea>
            </div> 
                <button type="submit" class="btn-primary">Enviar</button>
        </from>
        <p><strong>Direccion:</strong> Zacatlan, 98057 Zacatecas</p>
        <p><strong>Email:</strong> info@institutogutenbergmaran.edu.mx</p>
        <p><strong>Telefono:</strong> +52 492 922 1836</p>  
       <div class="redes-sociales">
            <a href="https://www.facebook.com/IGutenbergMaran/" target="_blank"><img src="facebook.png" alt="Facebook"></a>
            <a href="https://www.instagram.com/igutenbergmaran/" target="_blank"><img src="instagram.png" alt="Instagram"></a>
        </div>
       </div>
